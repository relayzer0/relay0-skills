interface:
  display_name: "Relay0"
  short_description: "Gateway models, coding tools, and agent-ops"
  default_prompt: >
    Use $relay0 to route through my Relay0 gateway. Discover models with GET /v1/models first.
    Configure each coding tool with the exact model ids it needs (Codex, Claude slots, Cursor, OpenClaw).
    Never ask for upstream provider secrets.
